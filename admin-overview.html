<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Overview</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="admin-overview.css">
</head>

<body>
    <div class="page">
        <header class="topbar">
            <div class="brand">
                <img id="brandLogo" src="barangay-logo.jpg" alt="Barangay logo">
                <div>
                    <h1 id="systemTitle">BARANGAY REQUEST SYSTEM</h1>
                    <p id="adminSubtitle">Admin Request Management</p>
                </div>
            </div>
            <div class="topbar-right">
                <div class="header-profile-card">
                    <div id="adminAvatar" class="admin-avatar">A</div>
                    <div class="header-profile-copy">
                        <strong id="adminProfileName">Loading...</strong>
                        <small id="adminProfileRole">Admin</small>
                        <span id="adminProfileEmail" class="header-email">-</span>
                    </div>
                    <div class="header-profile-meta">
                        <span id="adminProfileUsername" class="meta-pill">-</span>
                        <span id="adminProfileContact" class="meta-pill">-</span>
                    </div>
                </div>
            </div>
        </header>

        <main class="content">
            <aside class="admin-side-menu">
                <section class="side-unified-box">
                    <div class="side-block side-menu-block">
                        <h3><i class="fa-solid fa-bars"></i>Menu</h3>
                        <a class="menu-link" href="admin-dashboard.html"><i class="fa-solid fa-table-list"></i>Overview</a>
                        <a class="menu-link" href="#residents" data-section-link="residents"><i class="fa-solid fa-users"></i>Residents</a>
                        <a class="menu-link" href="#activity" data-section-link="activity"><i class="fa-solid fa-clock-rotate-left"></i>Recent Activity</a>
                        <a class="menu-link" href="admin-settings.html"><i class="fa-solid fa-gear"></i>Admin Settings</a>
                        <a class="menu-link danger" href="#" onclick="logoutAdmin(event)"><i class="fa-solid fa-right-from-bracket"></i>Logout</a>
                    </div>
                </section>
            </aside>

            <section class="panel request-panel">
                <div class="panel-head">
                    <h2 id="overviewTitle"><i class="fa-solid fa-table-list"></i>Residents</h2>
                </div>

                <section id="residents" class="section-panel">
                    <div class="section-subhead">
                        <p>Total Registered: <strong id="residentTotalCount">0</strong></p>
                    </div>
                    <ul id="residentQuickList" class="detail-list"></ul>
                </section>

                <section id="activity" class="section-panel">
                    <ul id="adminActivityList" class="detail-list"></ul>
                </section>
            </section>
        </main>
    </div>

    <script src="api-client.js"></script>
    <script src="admin-overview.js"></script>
</body>

</html>
